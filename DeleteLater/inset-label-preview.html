<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inset Label Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f3f4f6; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 40px 16px; }
  .sheet { background: white; border-radius: 24px 24px 0 0; padding: 24px 20px 32px; width: 100%; max-width: 420px; box-shadow: 0 -4px 24px rgba(0,0,0,0.12); }
  .handle { width: 40px; height: 4px; background: #d1d5db; border-radius: 99px; margin: 0 auto 20px; }
  .header-label { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: #6b7280; }
  .header-name { font-size: 16px; font-weight: 600; color: #1f2937; margin-bottom: 24px; }

  /* The inset label field */
  .field { position: relative; margin-bottom: 16px; }
  .field label {
    position: absolute;
    top: -9px;
    left: 12px;
    background: white;
    padding: 0 4px;
    font-size: 11px;
    font-weight: 600;
    color: #6b7280;
    letter-spacing: 0.03em;
    pointer-events: none;
    z-index: 1;
  }
  .field input,
  .field select,
  .field textarea {
    width: 100%;
    border: 1.5px solid #d1d5db;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 15px;
    color: #111827;
    background: white;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
  }
  .field input:focus,
  .field select:focus,
  .field textarea:focus {
    border-color: #3b82f6;
  }
  .field.error label { color: #ef4444; }
  .field.error input,
  .field.error select { border-color: #ef4444; }
  .field .error-msg { font-size: 12px; color: #ef4444; margin-top: 4px; padding-left: 4px; }
  .field textarea { resize: none; height: 80px; }

  /* select arrow */
  .field .select-wrap { position: relative; }
  .field .select-wrap::after {
    content: "▾";
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: #9ca3af;
    pointer-events: none;
    font-size: 14px;
  }

  .actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-primary { flex: 1; background: #3b82f6; color: white; border: none; border-radius: 10px; padding: 13px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .btn-cancel { background: #f3f4f6; color: #374151; border: none; border-radius: 10px; padding: 13px 20px; font-size: 15px; cursor: pointer; }
</style>
</head>
<body>
<div class="sheet">
  <div class="handle"></div>
  <div class="header-label">Nueva Consulta</div>
  <div class="header-name">Max</div>

  <div class="field">
    <label>Fecha de Consulta *</label>
    <input type="date" value="2026-06-13" />
  </div>

  <div class="field">
    <label>Procedimiento *</label>
    <div class="select-wrap">
      <select>
        <option value="">Seleccionar...</option>
        <option selected>Consulta General</option>
        <option>Vacunación</option>
      </select>
    </div>
  </div>

  <div class="field">
    <label>Notas</label>
    <textarea placeholder="Notas adicionales..."></textarea>
  </div>

  <div class="field">
    <label>Próxima Visita</label>
    <input type="date" />
  </div>

  <div class="field error">
    <label>Procedimiento *</label>
    <div class="select-wrap">
      <select>
        <option value="">Seleccionar...</option>
      </select>
    </div>
    <div class="error-msg">El procedimiento es requerido</div>
  </div>

  <div class="actions">
    <button class="btn-cancel">Cancelar</button>
    <button class="btn-primary">Guardar Consulta</button>
  </div>
</div>
</body>
</html>
